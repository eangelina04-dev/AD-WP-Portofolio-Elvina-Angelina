<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/projects.css}">
</head>
<body class="bg-dark text-white">

    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card project-card border-0 rounded-4 shadow-lg p-5">
                    <h2 class="fw-bold mb-4 text-accent text-center">
                        <i class="bi bi-pencil-square"></i> Edit Project
                    </h2>
                    
                    <form th:action="@{/projects/edit/{id}(id=${project.id})}" th:object="${project}" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label">PROJECT TITLE *</label>
                            <input type="text" class="form-control" th:field="*{title}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">CATEGORY *</label>
                            <input type="text" class="form-control" th:field="*{category}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">DESCRIPTION *</label>
                            <textarea class="form-control" th:field="*{description}" rows="5" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">IMAGE URL</label>
                            <input type="text" class="form-control" th:field="*{imageUrl}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">GITHUB URL</label>
                            <input type="text" class="form-control" th:field="*{githubUrl}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">FIGMA URL</label>
                            <input type="text" class="form-control" th:field="*{figmaUrl}">
                        </div>

                        <div class="d-flex justify-content-center gap-3 mt-5">
                            <a th:href="@{/projects}" class="btn btn-custom px-4">Cancel</a>
                            <button type="submit" class="btn btn-custom px-4 fw-bold">Update Project</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
